<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>FPS — 混合战场</title>
  <link rel="stylesheet" href="style/hud.css">
  <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/",
      "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
    }
  }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="hud">
    <div id="minimap-container">
      <canvas id="minimap" width="150" height="150"></canvas>
      <div id="kill-progress">0 / 15</div>
    </div>
    <div id="crosshair"><span></span><span></span><span></span><span></span></div>
    <div id="stats-bar">
      <div id="health-block">
        <div class="bar-label">HP</div>
        <div class="bar-track"><div id="health-fill" class="bar-fill health"></div></div>
        <div id="health-num">100</div>
      </div>
      <div id="stamina-block">
        <div class="bar-label">SP</div>
        <div class="bar-track"><div id="stamina-fill" class="bar-fill stamina"></div></div>
      </div>
      <div id="weapon-block">
        <div id="weapon-name">—</div>
        <div id="ammo-display"><span id="ammo-cur">—</span> / <span id="ammo-res">—</span></div>
      </div>
    </div>
    <div id="kill-feed"></div>
    <div id="hit-marker"></div>
    <div id="damage-overlay"></div>
    <div id="ship-health-block" class="hidden">
      <div class="bar-label">舰体</div>
      <div class="bar-track ship-track"><div id="ship-health-fill" class="bar-fill ship-hp"></div></div>
      <div id="ship-health-num">5000</div>
    </div>
    <div id="wave-indicator" class="hidden"></div>
    <div id="turret-prompt"></div>
  </div>
  <div id="screen-lock" class="screen">
    <h2>点击进入游戏</h2>
    <p>鼠标将被锁定，按 ESC 暂停</p>
    <button id="btn-enter">进入战场</button>
  </div>
  <div id="screen-pause" class="screen hidden">
    <h2>暂停</h2>
    <div id="settings-panels">
      <div id="gameplay-settings" class="settings-panel">
        <h3>游戏设置</h3>
        <div class="vol-row"><label>行走速度</label><input type="range" id="set-walk" min="5" max="30" value="12"><span class="vol-val">12</span></div>
        <div class="vol-row"><label>冲刺速度</label><input type="range" id="set-sprint" min="10" max="50" value="20"><span class="vol-val">20</span></div>
        <div class="vol-row"><label>蹲走速度</label><input type="range" id="set-crouch" min="2" max="15" value="6"><span class="vol-val">6</span></div>
        <div class="vol-row"><label>跳跃高度</label><input type="range" id="set-jump" min="5" max="30" value="12"><span class="vol-val">12</span></div>
        <div class="vol-row"><label>鼠标灵敏</label><input type="range" id="set-sens" min="1" max="10" value="4"><span class="vol-val">4</span></div>
        <div class="vol-row"><label>体力消耗</label><input type="range" id="set-stamdr" min="5" max="60" value="30"><span class="vol-val">30</span></div>
        <div class="vol-row"><label>体力恢复</label><input type="range" id="set-stamrg" min="5" max="60" value="20"><span class="vol-val">20</span></div>
      </div>
      <div id="audio-settings" class="settings-panel">
        <h3>音效设置</h3>
        <div class="vol-row"><label>主音量</label><input type="range" id="vol-master" min="0" max="100" value="70"><span class="vol-val">70%</span></div>
        <div class="vol-row"><label>武器射击</label><input type="range" id="vol-fire" min="0" max="100" value="80"><span class="vol-val">80%</span></div>
        <div class="vol-row"><label>换弹声音</label><input type="range" id="vol-reload" min="0" max="100" value="60"><span class="vol-val">60%</span></div>
        <div class="vol-row"><label>怪物声音</label><input type="range" id="vol-enemy" min="0" max="100" value="40"><span class="vol-val">40%</span></div>
        <div class="vol-row"><label>环境音效</label><input type="range" id="vol-effects" min="0" max="100" value="70"><span class="vol-val">70%</span></div>
        <div class="vol-row"><label>背景音乐</label><input type="range" id="vol-music" min="0" max="100" value="25"><span class="vol-val">25%</span></div>
      </div>
    </div>
    <button id="btn-resume">继续</button>
    <button id="btn-menu">返回主菜单</button>
  </div>
  <div id="screen-dead" class="screen hidden">
    <h2>YOU DIED</h2>
    <button id="btn-retry">重玩</button>
    <button id="btn-menu-dead">主菜单</button>
  </div>
  <div id="screen-win" class="screen hidden">
    <h2>任务完成</h2>
    <div id="win-stats"></div>
    <button id="btn-next-level" class="hidden">下一关</button>
    <button id="btn-menu-win">主菜单</button>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
